<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电路答疑君</title>
    <style>
        /* 聊天窗口样式 */
        #ai-chat {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 380px;
            height: 600px;
            background: white;
            border-radius: 18px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            z-index: 9999;
            font-family: system-ui;
        }
        .chat-header {
            padding: 16px;
            background: #007aff;
            color: white;
            font-weight: bold;
            font-size: 16px;
            border-radius: 18px 18px 0 0;
        }
        .chat-body {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
        }
        .message {
            margin-bottom: 10px;
            padding: 10px 14px;
            border-radius: 16px;
            max-width: 75%;
            line-height: 1.4;
        }
        .user {
            background: #007aff;
            color: white;
            margin-left: auto;
        }
        .bot {
            background: #f2f2f7;
            color: #000;
            margin-right: auto;
        }
        .chat-input {
            display: flex;
            padding: 12px;
            gap: 8px;
            border-top: 1px solid #eee;
        }
        .chat-input input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 24px;
            outline: none;
            font-size: 14px;
        }
        .chat-input button {
            padding: 12px 20px;
            background: #007aff;
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>我的网页</h1>
    <p>这是我的第一个<br>完整页面</p>

    <h2>图片</h2>
    <img src="https://picsum.photos/300" alt="风景">

    <h2>链接</h2>
    <a href="https://www.baidu.com">百度一下</a>

    <p>我是文字 <span>我是一小段特殊文字</span></p>

    <h2>列表</h2>
    <ul>
        <li>学习 HTML</li>
        <li>学习 CSS</li>   
    </ul>

    <button>我是按钮</button>
    <input type="text" placeholder="输入点什么...">

    <!-- ✅ 纯聊天窗口（你的智能体完整功能） -->
    <div id="ai-chat">
        <div class="chat-header">电路答疑君</div>
        <div class="chat-body" id="messages"></div>
        <div class="chat-input">
            <input type="text" id="input" placeholder="输入电路问题...">
            <button id="send">发送</button>
        </div>
    </div>

    <script>
        // 你的配置（已经全部填好）
        const BOT_ID = "756258914479561151";
        const API_KEY = "pat_VaZ46sfjO9bOY9qkyxZM9fVpK6mJ2mXyKPePM39S5Y3abewEtCsaxOU9fP6CUuno";

        const messagesEl = document.getElementById("messages");
        const inputEl = document.getElementById("input");
        const sendEl = document.getElementById("send");

        // 发送消息
        async function send() {
            const text = inputEl.value.trim();
            if (!text) return;

            // 显示用户消息
            addMsg(text, "user");
            inputEl.value = "";

            try {
                const res = await fetch("https://api.coze.cn/v1/chat", {
                    method: "POST",
                    headers: {
                        "Authorization": "Bearer " + API_KEY,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        bot_id: BOT_ID,
                        user_id: "visitor",
                        messages: [{ role: "user", content: text, content_type: "text" }]
                    })
                });

                const data = await res.json();
                const ans = data.messages?.find(m => m.role === "assistant")?.content || "无法回答";
                addMsg(ans, "bot");
            } catch (e) {
                addMsg("出错了", "bot");
            }
        }

        // 添加消息到界面
        function addMsg(text, role) {
            const div = document.createElement("div");
            div.className = "message " + role;
            div.textContent = text;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        sendEl.onclick = send;
        inputEl.onkeydown = e => e.key === "Enter" && send();
    </script>

</body>
</html>
