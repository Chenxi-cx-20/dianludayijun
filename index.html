<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电路答疑君</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            line-height: 1.6;
            padding: 20px;
        }

        /* 悬浮按钮 */
        #ai-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: #007aff;
            color: white;
            font-size: 26px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 9999;
        }

        /* 聊天窗口 */
        #ai-window {
            position: fixed;
            bottom: 100px;
            right: 20px;
            width: 380px;
            height: 600px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            display: none;
            z-index: 9998;
            overflow: hidden;
        }

        #ai-window iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <h1>电路答疑君</h1>
    <p>一个为你量身定做的在线《电路理论》学习助手</p>

    <h2>链接</h2>
    <a href="https://www.baidu.com">来参观一下母校？</a>

    <p>我是文字 我是一小段特殊文字</p>

    <h2>列表</h2>
    <ul>
        <li>第一章</li>
        <li>第二章</li>
        <li>第三章</li>
        <li>…………</li>
    </ul>

    <button>我是（目前还不能用的）搜索按钮</button>
    <input type="text" placeholder="输入点什么...">

    <!-- 悬浮按钮 -->
    <button id="ai-btn">💬</button>

    <!-- 聊天窗口（加上__skip-auth=1，强制跳过登录） -->
    <div id="ai-window">
        <iframe 
            src="https://www.coze.cn/store/agent/7562589144795611151?bot_id=true&__skip-auth=1" 
            allow="clipboard-read; clipboard-write"
        ></iframe>
    </div>

    <script>
        const btn = document.getElementById('ai-btn');
        const win = document.getElementById('ai-window');

        btn.addEventListener('click', () => {
            if (win.style.display === 'block') {
                win.style.display = 'none';
                btn.textContent = '💬';
            } else {
                win.style.display = 'block';
                btn.textContent = '✕';
            }
        });
    </script>
</body>
</html>
