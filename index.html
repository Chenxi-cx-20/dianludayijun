<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电路答疑君</title>
    <style>
        /* 1. 悬浮按钮：永远在最前面，不会被遮挡 */
        #ai-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: #007aff;
            color: white;
            font-size: 26px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 9999; /* 最高层级 */
        }

        /* 2. 聊天窗口：默认隐藏，上移到按钮上方 */
        #ai-window {
            position: fixed;
            bottom: 100px !important; /* 强制上移，离底部100px，避开按钮 */
            right: 20px;
            width: 380px;
            height: 600px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            display: none; /* 默认不显示 */
            z-index: 9998; /* 层级比按钮低 */
            overflow: hidden;
        }

        /* 3. 里面的iframe，跟着父容器一起移动 */
        #ai-window iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <h1>电路答疑君</h1>
    <p>一个为你量身定做的<br>《电路理论》在线学习助手</p>

    <h2>试验的图片</h2>
    <img src="https://picsum.photos/300" alt="风景">

    <h2>试验的链接</h2>
    <a href="https://www.bucea.edu.cn/">参观一下母校？</a>

    <p>我是文字 <span>我是一小段特殊文字</span></p>

    <h2>暂时的目录</h2>
    <ul>
        <li>第一章</li>
        <li>第二章</li>   
        <li>第三章</li>
        <li>…………</li>
    </ul>

    <button>我是（暂时不能用的）搜索按钮</button>
    <input type="text" placeholder="输入点什么...">

    <!-- 悬浮按钮 -->
    <button id="ai-btn">💬</button>

    <!-- 聊天窗口（默认隐藏，上移到按钮上方） -->
    <div id="ai-window">
        <iframe 
            src="https://www.coze.cn/store/agent/7562589144795611151?bot_id=true" 
            allow="clipboard-read; clipboard-write"
        ></iframe>
    </div>

    <script>
        const btn = document.getElementById('ai-btn');
        const win = document.getElementById('ai-window');

        btn.addEventListener('click', () => {
            if (win.style.display === 'block') {
                // 收起窗口
                win.style.display = 'none';
                btn.textContent = '💬';
            } else {
                // 展开窗口
                win.style.display = 'block';
                btn.textContent = '✕';
            }
        });
    </script>

</body>
</html>
