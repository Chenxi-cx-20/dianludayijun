<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电路答疑君</title>
    <style>
        /* 聊天窗口：默认隐藏，层级比按钮低 */
        #ai-window {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 380px;
            height: 600px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            display: none;
            z-index: 9998; /* 比按钮低 */
            overflow: hidden;
        }

        /* 悬浮按钮：层级最高，永远在最前面 */
        #ai-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: #007aff;
            color: white;
            font-size: 26px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 9999; /* 比窗口高 */
        }
    </style>
</head>
<body>

    <h1>我的网页</h1>
    <p>这是我的第一个<br>完整页面</p>

    <h2>图片</h2>
    <img src="https://picsum.photos/300" alt="风景">

    <h2>链接</h2>
    <a href="https://www.baidu.com">百度一下</a>

    <p>我是文字 <span>我是一小段特殊文字</span></p>

    <h2>列表</h2>
    <ul>
        <li>学习 HTML</li>
        <li>学习 CSS</li>   
    </ul>

    <button>我是按钮</button>
    <input type="text" placeholder="输入点什么...">

    <!-- 1. 悬浮按钮（永远在最前面） -->
    <button id="ai-btn">💬</button>

    <!-- 2. 聊天窗口（默认隐藏） -->
    <div id="ai-window">
        <iframe 
            src="https://www.coze.cn/store/agent/7562589144795611151?bot_id=true" 
            style="width:100%; height:100%; border:none;"
            allow="clipboard-read; clipboard-write"
        ></iframe>
    </div>

    <script>
        const btn = document.getElementById('ai-btn');
        const win = document.getElementById('ai-window');

        btn.addEventListener('click', () => {
            if (win.style.display === 'block') {
                // 收起窗口
                win.style.display = 'none';
                btn.textContent = '💬';
            } else {
                // 展开窗口
                win.style.display = 'block';
                btn.textContent = '✕';
            }
        });
    </script>

</body>
</html>
